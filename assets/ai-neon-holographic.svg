<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgBase" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="60%" stop-color="#060b16"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>
    <radialGradient id="cyanBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="magBlob" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2436"/>
      <stop offset="100%" stop-color="#141131"/>
    </linearGradient>
    <filter id="bigBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="softBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
    <filter id="neonGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .cardLabel { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11.5px; fill: #cfe9ff; text-anchor: middle; font-weight: 600; }
      .title { font-family: 'JetBrains Mono', monospace; font-size: 17px; fill: #e8f7ff; text-anchor: middle; letter-spacing: 1.5px; }
      .cline { stroke: url(#lineGrad); stroke-width: 1.4; fill: none; opacity: 0.55; stroke-dasharray: 5 7; }
    </style>
  </defs>

  <!-- base background -->
  <rect x="0" y="0" width="900" height="460" fill="url(#bgBase)"/>

  <!-- ambient color blobs -->
  <circle cx="150" cy="120" r="160" fill="url(#cyanBlob)" filter="url(#bigBlur)">
    <animate attributeName="opacity" values="0.5;0.85;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="330" r="180" fill="url(#magBlob)" filter="url(#bigBlur)">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="380" r="140" fill="url(#cyanBlob)" filter="url(#bigBlur)">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <!-- drifting bokeh -->
  <g filter="url(#softBlur)">
    <circle cx="80" cy="60" r="5" fill="#38f0ff" opacity="0.7"><animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="90" r="7" fill="#e879f9" opacity="0.6"><animate attributeName="cy" values="90;65;90" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="380" r="6" fill="#38f0ff" opacity="0.5"><animate attributeName="cy" values="380;355;380" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="400" r="4" fill="#38f0ff" opacity="0.7"><animate attributeName="cy" values="400;378;400" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="30" r="4" fill="#e879f9" opacity="0.6"><animate attributeName="cy" values="30;10;30" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="420" r="5" fill="#38f0ff" opacity="0.5"><animate attributeName="cy" values="420;398;420" dur="5.2s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="40" r="6" fill="#e879f9" opacity="0.55"><animate attributeName="cy" values="40;18;40" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="220" r="8" fill="#38f0ff" opacity="0.45"><animate attributeName="cy" values="220;198;220" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="20" cy="220" r="6" fill="#e879f9" opacity="0.5"><animate attributeName="cy" values="220;200;220" dur="5.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- small accent triangles -->
  <polygon points="70,150 84,178 56,178" fill="#d946ef" opacity="0.35">
    <animateTransform attributeName="transform" type="rotate" values="0 70 165;15 70 165;0 70 165" dur="6s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="840,150 856,182 824,182" fill="#22d3ee" opacity="0.35">
    <animateTransform attributeName="transform" type="rotate" values="0 840 165;-15 840 165;0 840 165" dur="7s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="480,420 496,450 464,450" fill="#22d3ee" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" values="0 480 435;12 480 435;0 480 435" dur="5.5s" repeatCount="indefinite"/>
  </polygon>

  <!-- title -->
  <text x="450" y="34" class="title">AI &amp; LLM EXPERTISE</text>

  <!-- circuit traces from core to each card -->
  <path class="cline" d="M450,300 L150,150"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1.3s" repeatCount="indefinite"/></path>
  <path class="cline" d="M450,300 L330,105"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1.1s" repeatCount="indefinite"/></path>
  <path class="cline" d="M450,300 L560,95"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1.4s" repeatCount="indefinite"/></path>
  <path class="cline" d="M450,300 L740,150"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1.2s" repeatCount="indefinite"/></path>
  <path class="cline" d="M450,300 L770,300"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1.5s" repeatCount="indefinite"/></path>
  <path class="cline" d="M450,300 L130,320"><animate attributeName="stroke-dashoffset" values="0;-24" dur="1.6s" repeatCount="indefinite"/></path>

  <!-- traveling particles along traces -->
  <circle r="3.5" fill="#9be8ff"><animateMotion dur="2.4s" repeatCount="indefinite" path="M450,300 L150,150"/></circle>
  <circle r="3.5" fill="#9be8ff"><animateMotion dur="2s" repeatCount="indefinite" path="M450,300 L330,105"/></circle>
  <circle r="3.5" fill="#f0abfc"><animateMotion dur="2.6s" repeatCount="indefinite" path="M450,300 L560,95"/></circle>
  <circle r="3.5" fill="#f0abfc"><animateMotion dur="2.2s" repeatCount="indefinite" path="M450,300 L740,150"/></circle>
  <circle r="3.5" fill="#9be8ff"><animateMotion dur="2.8s" repeatCount="indefinite" path="M450,300 L770,300"/></circle>
  <circle r="3.5" fill="#f0abfc"><animateMotion dur="3s" repeatCount="indefinite" path="M450,300 L130,320"/></circle>

  <!-- central AI core chip -->
  <g filter="url(#neonGlow)">
    <rect x="410" y="260" width="80" height="80" rx="12" fill="#0b1e33" stroke="#38f0ff" stroke-width="1.6" transform="rotate(45 450 300)">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <line x1="424" y1="300" x2="476" y2="300" stroke="#38f0ff" stroke-width="1" opacity="0.6"/>
    <line x1="450" y1="274" x2="450" y2="326" stroke="#38f0ff" stroke-width="1" opacity="0.6"/>
    <line x1="432" y1="282" x2="468" y2="318" stroke="#38f0ff" stroke-width="1" opacity="0.4"/>
    <line x1="468" y1="282" x2="432" y2="318" stroke="#38f0ff" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- connector up to floating core icon -->
  <line x1="450" y1="260" x2="450" y2="215" stroke="#38f0ff" stroke-width="1.4" opacity="0.7"/>
  <g filter="url(#neonGlow)">
    <circle cx="450" cy="195" r="26" fill="#0b1e33" stroke="#38f0ff" stroke-width="1.6">
      <animate attributeName="r" values="24;28;24" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="450" y="203" font-size="20" text-anchor="middle">🧠</text>

  <!-- floating icon cards -->
  <!-- OpenAI -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="3.1s" repeatCount="indefinite"/>
    <g filter="url(#neonGlow)">
      <rect x="115" y="115" width="70" height="70" rx="14" fill="url(#cardGrad)" stroke="#38f0ff" stroke-width="1.4"/>
    </g>
    <text x="150" y="160" font-size="26" text-anchor="middle">🤖</text>
    <text x="150" y="202" class="cardLabel">OpenAI</text>
  </g>

  <!-- Groq -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-13; 0,0" dur="2.6s" repeatCount="indefinite"/>
    <g filter="url(#neonGlow)">
      <rect x="295" y="70" width="70" height="70" rx="14" fill="url(#cardGrad)" stroke="#f0abfc" stroke-width="1.4"/>
    </g>
    <text x="330" y="115" font-size="26" text-anchor="middle">⚡</text>
    <text x="330" y="157" class="cardLabel">Groq</text>
  </g>

  <!-- Gemini -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-9; 0,0" dur="3.4s" repeatCount="indefinite"/>
    <g filter="url(#neonGlow)">
      <rect x="525" y="60" width="70" height="70" rx="14" fill="url(#cardGrad)" stroke="#38f0ff" stroke-width="1.4"/>
    </g>
    <text x="560" y="105" font-size="26" text-anchor="middle">✨</text>
    <text x="560" y="147" class="cardLabel">Gemini</text>
  </g>

  <!-- LangChain -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-12; 0,0" dur="2.8s" repeatCount="indefinite"/>
    <g filter="url(#neonGlow)">
      <rect x="705" y="115" width="70" height="70" rx="14" fill="url(#cardGrad)" stroke="#f0abfc" stroke-width="1.4"/>
    </g>
    <text x="740" y="160" font-size="26" text-anchor="middle">🔗</text>
    <text x="740" y="202" class="cardLabel">LangChain</text>
  </g>

  <!-- RAG -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-11; 0,0" dur="3.2s" repeatCount="indefinite"/>
    <g filter="url(#neonGlow)">
      <rect x="735" y="265" width="70" height="70" rx="14" fill="url(#cardGrad)" stroke="#38f0ff" stroke-width="1.4"/>
    </g>
    <text x="770" y="310" font-size="26" text-anchor="middle">📚</text>
    <text x="770" y="352" class="cardLabel">RAG</text>
  </g>

  <!-- Agents -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-14; 0,0" dur="2.5s" repeatCount="indefinite"/>
    <g filter="url(#neonGlow)">
      <rect x="95" y="285" width="70" height="70" rx="14" fill="url(#cardGrad)" stroke="#f0abfc" stroke-width="1.4"/>
    </g>
    <text x="130" y="330" font-size="26" text-anchor="middle">🕸️</text>
    <text x="130" y="372" class="cardLabel">AI Agents</text>
  </g>
</svg>
